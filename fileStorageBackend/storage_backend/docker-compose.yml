version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: storage_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_DB=storage_db
      - POSTGRES_USER=storage_user
      - POSTGRES_PASSWORD=storage_password
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storage_user -d storage_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    container_name: storage_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: storage_backend
    restart: unless-stopped
    command: >
      sh -c "./wait-for db:5432 --timeout=10 -- \
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn storage_backend.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    volumes:
      - ./:/app
      - static_volume:/app/static
      - ./media:/app/media          # <-- МОНТИРУЕМ ЛОКАЛЬНУЮ ПАПКУ С КОМПА
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - DB_NAME=${DB_NAME:-storage_db}
      - DB_USER=${DB_USER:-storage_user}
      - DB_PASSWORD=${DB_PASSWORD:-storage_password}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EMAIL_HOST=${EMAIL_HOST:-smtp.yandex.ru}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
      - FRONTEND_URL=${FRONTEND_URL:-http://127.0.0.1:5173}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  nginx:
    image: nginx:1.25-alpine
    container_name: storage_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - ./media:/media                # <-- ТОЖЕ МОНТИРУЕМ ЛОКАЛЬНУЮ ПАПКУ ДЛЯ NGINX
    ports:
      - "80:80"
    depends_on:
      - backend

  celery_worker:
    build: .
    container_name: storage_celery_worker
    restart: unless-stopped
    command: celery -A storage_backend worker --loglevel=info
    volumes:
      - ./:/app
      - ./media:/app/media            # <-- И ДЛЯ CELERY ТОЖЕ
    environment:
      - DEBUG=${DEBUG:-False}
      - DB_NAME=${DB_NAME:-storage_db}
      - DB_USER=${DB_USER:-storage_user}
      - DB_PASSWORD=${DB_PASSWORD:-storage_password}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - backend
      - redis
      - db
    env_file:
      - .env

  celery_beat:
    build: .
    container_name: storage_celery_beat
    restart: unless-stopped
    command: celery -A storage_backend beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./:/app
    environment:
      - DEBUG=${DEBUG:-False}
      - DB_NAME=${DB_NAME:-storage_db}
      - DB_USER=${DB_USER:-storage_user}
      - DB_PASSWORD=${DB_PASSWORD:-storage_password}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - backend
      - redis
      - db
      - celery_worker
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data:
  static_volume:        # Оставляем static_volume, но media убрали из volumes