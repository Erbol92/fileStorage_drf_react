version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: storage_db
    restart: unless-stopped
    volumes:
      - ./postgres_data:/var/lib/postgresql/data/
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_DB=${{ secrets.BACKEND_DB_NAME }}
      - POSTGRES_USER=${{ secrets.BACKEND_DB_USER }}
      - POSTGRES_PASSWORD=${{ secrets.BACKEND_DB_PASSWORD }}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storage_user -d storage_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: storage_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  backend:
    image: erbol92/backend
    environment:
      - DEBUG=${{ secrets.BACKEND_DEBUG }}
      - SECRET_KEY=${{ secrets.BACKEND_SECRET_KEY }}
      - ALLOWED_HOSTS=${{ secrets.BACKEND_ALLOWED_HOSTS }}
      - DB_NAME=${{ secrets.BACKEND_DB_NAME }}
      - DB_USER=${{ secrets.BACKEND_DB_USER }}
      - DB_PASSWORD=${{ secrets.BACKEND_DB_PASSWORD }}
      - DB_HOST=${{ secrets.BACKEND_DB_HOST }}
      - DB_PORT=${{ secrets.BACKEND_DB_PORT }}
      - REDIS_HOST=${{ secrets.BACKEND_REDIS_HOST }}
      - REDIS_PORT=${{ secrets.BACKEND_REDIS_PORT }}
      - CORS_ALLOWED_ORIGINS=${{ secrets.BACKEND_CORS_ALLOWED_ORIGINS }}
      - CSRF_TRUSTED_ORIGINS=${{ secrets.BACKEND_CSRF_TRUSTED_ORIGINS }}
      - EMAIL_HOST=${{ secrets.BACKEND_EMAIL_HOST_USER }}
      - EMAIL_PORT=${{ secrets.BACKEND_EMAIL_PORT }}
      - EMAIL_HOST_USER=${{ secrets.BACKEND_DB_NAME }}
      - EMAIL_HOST_PASSWORD=${{ secrets.BACKEND_EMAIL_HOST_PASSWORD }}
      - EMAIL_USE_TLS=${{ secrets.BACKEND_EMAIL_USE_TLS }}
      - DEFAULT_FROM_EMAIL=${{ secrets.BACKEND_DEFAULT_FROM_EMAIL }}
      - FRONTEND_URL=${{ secrets.BACKEND_FRONTEND_URL }}
      - CELERY_BROKER_URL=${{ secrets.BACKEND_CELERY_BROKER_URL }}
      - CELERY_RESULT_BACKEND=${{ secrets.BACKEND_CELERY_RESULT_BACKEND }}
    container_name: storage_backend
    restart: unless-stopped
    command: >
      sh -c "./wait-for db:5432 --timeout=10 -- \
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn storage_backend.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    volumes:
      - ./media:/app/media          # <-- МОНТИРУЕМ ЛОКАЛЬНУЮ ПАПКУ С КОМПА
      - static_volume:/app/static
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  celery_worker:
    image: erbol92/backend
    container_name: storage_celery_worker
    restart: unless-stopped
    command: celery -A storage_backend worker --loglevel=info
    depends_on:
      - backend
      - redis
      - db
    environment:
      - CELERY_BROKER_URL=${{ secrets.BACKEND_CELERY_BROKER_URL }}
      - CELERY_RESULT_BACKEND=${{ secrets.BACKEND_CELERY_RESULT_BACKEND }}
    networks:
      - app_network

  celery_beat:
    image: erbol92/backend
    container_name: storage_celery_beat
    restart: unless-stopped
    command: celery -A storage_backend beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - backend
      - redis
      - db
      - celery_worker
    environment:
      - CELERY_BROKER_URL=${{ secrets.BACKEND_CELERY_BROKER_URL }}
      - CELERY_RESULT_BACKEND=${{ secrets.BACKEND_CELERY_RESULT_BACKEND }}
    networks:
      - app_network

  frontend:
    image: erbol92/frontend
    env_file:
      - ./fileStorageFrontend/.env
    container_name: storage_frontend
    restart: unless-stopped
    volumes:
      - ./nginx/front/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./reb-study.ru.crt:/etc/nginx/ssl/reb-study.ru.crt
      - ./reb-study.ru.key:/etc/nginx/ssl/reb-study.ru.key
      - static_volume:/static
    ports:
      - "443:443"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=${{ secrets.FRONT_VITE_API_URL }}
      - VITE_BACKEND_URL=${{ secrets.FRONT_VITE_BACKEND_URL }}
    networks:
      - app_network

volumes:
  static_volume:

networks:
  app_network:
    driver: bridge