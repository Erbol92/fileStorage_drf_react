version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: storage_db
    restart: unless-stopped
    volumes:
      - ./postgres_data:/var/lib/postgresql/data/
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_DB=storage_db
      - POSTGRES_USER=storage_user
      - POSTGRES_PASSWORD=storage_password
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storage_user -d storage_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - ./fileStorageBackend/storage_backend/.env

  redis:
    image: redis:7-alpine
    container_name: storage_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./fileStorageBackend/storage_backend
    env_file:
      - ./fileStorageBackend/storage_backend/.env
    container_name: storage_backend
    restart: unless-stopped
    command: >
      sh -c "./wait-for db:5432 --timeout=10 -- \
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn storage_backend.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    volumes:
      - ./media:/app/media          # <-- МОНТИРУЕМ ЛОКАЛЬНУЮ ПАПКУ С КОМПА
      - static_volume:/app/static
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: storage_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
    ports:
      - "80:80"
    depends_on:
      - backend

  celery_worker:
    build: ./fileStorageBackend/storage_backend
    container_name: storage_celery_worker
    restart: unless-stopped
    command: celery -A storage_backend worker --loglevel=info
    depends_on:
      - backend
      - redis
      - db
    env_file:
      - ./fileStorageBackend/storage_backend/.env

  celery_beat:
    build: ./fileStorageBackend/storage_backend
    container_name: storage_celery_beat
    restart: unless-stopped
    command: celery -A storage_backend beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - backend
      - redis
      - db
      - celery_worker
    env_file:
      - ./fileStorageBackend/storage_backend/.env
volumes:
  static_volume:
